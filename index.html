<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Company Banner Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <style>
    .logo img {
      border: 6px double black;
      border-radius: 50%;
      box-shadow: 0 0px 10px 15px #7abb08;
      width: 150px;
      height: 150px;

      background-color: white;
      margin: 32px;
      object-fit: contain;
    }
  </style>
  <body>
    <div class="logo">
      <img src="images/download.png" alt="" />
    </div>
    <div class="content">
      <div class="heading">
        <span style="color: #7abb08; text-shadow: 0 2px 5px white">
          Welcome</span
        >
        To Our Website
        <h2>
          We Provide
          <span style="color: #7abb08; text-shadow: 0 2px 2.5px white"
            >Hardware Solutions</span
          >
          For Buisnesses.
        </h2>
        <h3>
          Our mission is to create simple and useful
          <span style="color: #7abb08; text-shadow: 0 2px 2px white"
            >technology</span
          >.
        </h3>
      </div>
    </div>
  </body>
</html>
